<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>inkline — gesture-driven living ink</title>
<meta property="og:title" content="inkline — gesture-driven living ink">
<meta property="og:description" content="You draw; a seeded noise field steals the stroke and keeps drawing without you. A GØDN experiment.">
<meta property="og:image" content="https://godinhofonsec.github.io/inkline/og.png">
<meta property="og:url" content="https://godinhofonsec.github.io/inkline/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://godinhofonsec.github.io/inkline/og.png">
<meta name="description" content="Gesture-driven living ink. You draw; a seeded noise field steals the stroke and keeps drawing without you.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0e0e0e; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #e8e4dd; }
  #canvas { position: fixed; inset: 0; display: block; cursor: crosshair; touch-action: none; }
  header {
    position: fixed; top: 20px; left: 24px; pointer-events: none; user-select: none;
    mix-blend-mode: difference;
  }
  header h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; }
  header p { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.55; margin-top: 4px; }
  #panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 12px 24px; background: rgba(14,14,14,0.82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid rgba(232,228,221,0.12);
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    transition: opacity 0.4s; z-index: 10;
  }
  #panel.hidden { opacity: 0; pointer-events: none; }
  .ctrl { display: flex; align-items: center; gap: 8px; }
  .ctrl label { opacity: 0.55; white-space: nowrap; }
  .ctrl input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 90px; height: 2px;
    background: rgba(232,228,221,0.25); outline: none;
  }
  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 10px; height: 10px;
    background: #e8e4dd; border-radius: 50%; cursor: pointer;
  }
  .ctrl input[type="range"]::-moz-range-thumb {
    width: 10px; height: 10px; background: #e8e4dd; border: none; border-radius: 50%; cursor: pointer;
  }
  #seedInput {
    width: 84px; background: transparent; border: 1px solid rgba(232,228,221,0.25);
    color: #e8e4dd; padding: 4px 8px; font-size: 10px; letter-spacing: 0.14em;
    font-family: inherit; text-transform: uppercase;
  }
  #seedInput:focus { outline: none; border-color: #d94f2b; }
  button {
    background: transparent; border: 1px solid rgba(232,228,221,0.25); color: #e8e4dd;
    padding: 5px 12px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    font-family: inherit; cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  button:hover { border-color: #d94f2b; color: #d94f2b; }
  #hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.35;
    pointer-events: none; user-select: none; transition: opacity 1.2s;
  }
  #hint.gone { opacity: 0; }
  .spacer { flex: 1; }
  #accentVal, #flowVal, #gripVal { opacity: 0.9; min-width: 34px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<header>
  <h1>inkline</h1>
  <p>gesture-driven living ink · GØDN</p>
</header>
<div id="hint">draw — the field will finish your line</div>
<div id="panel">
  <div class="ctrl">
    <label for="seedInput">seed</label>
    <input id="seedInput" type="text" value="godn-01" spellcheck="false">
    <button id="reseedBtn" title="random seed">↻</button>
  </div>
  <div class="ctrl">
    <label for="accentSlider">accent</label>
    <input id="accentSlider" type="range" min="0" max="100" value="15">
    <span id="accentVal">15%</span>
  </div>
  <div class="ctrl">
    <label for="flowSlider">flow</label>
    <input id="flowSlider" type="range" min="10" max="100" value="55">
    <span id="flowVal">55</span>
  </div>
  <div class="ctrl">
    <label for="gripSlider">grip</label>
    <input id="gripSlider" type="range" min="5" max="95" value="40">
    <span id="gripVal">40</span>
  </div>
  <div class="spacer"></div>
  <div class="ctrl"><button id="clearBtn">clear</button></div>
  <div class="ctrl"><button id="saveBtn">save png</button></div>
</div>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0, H = 0;

  var BG = "#0e0e0e";
  var INK = { r: 232, g: 228, b: 221 };
  var ACCENT = { r: 217, g: 79, b: 43 }; // #d94f2b

  // ---------- seeded randomness ----------
  function hashSeed(str) {
    var h = 2166136261 >>> 0;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ---------- seeded value noise (fBm) ----------
  var PERM = new Uint8Array(512);
  function buildPermutation(rand) {
    var p = new Uint8Array(256);
    for (var i = 0; i < 256; i++) p[i] = i;
    for (var j = 255; j > 0; j--) {
      var k = Math.floor(rand() * (j + 1));
      var tmp = p[j]; p[j] = p[k]; p[k] = tmp;
    }
    for (var m = 0; m < 512; m++) PERM[m] = p[m & 255];
  }
  function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function valueAt(ix, iy) { return PERM[(PERM[ix & 255] + iy) & 255] / 255; }
  function noise2(x, y) {
    var x0 = Math.floor(x), y0 = Math.floor(y);
    var fx = x - x0, fy = y - y0;
    var u = fade(fx), v = fade(fy);
    var a = valueAt(x0, y0), b = valueAt(x0 + 1, y0);
    var c = valueAt(x0, y0 + 1), d = valueAt(x0 + 1, y0 + 1);
    return (a + (b - a) * u) + ((c + (d - c) * u) - (a + (b - a) * u)) * v;
  }
  function fbm(x, y) {
    var sum = 0, amp = 0.5, freq = 1;
    for (var o = 0; o < 3; o++) {
      sum += amp * noise2(x * freq, y * freq);
      amp *= 0.5; freq *= 2.1;
    }
    return sum / 0.875;
  }

  // ---------- state ----------
  var params = {
    seed: "godn-01",
    accent: 0.15,   // share of strokes in GØDN orange
    flow: 0.55,     // field strength
    grip: 0.40      // how long your gesture keeps control (higher = longer)
  };
  var rand = mulberry32(hashSeed(params.seed));
  var fieldScale = 0.0016;
  var fieldTime = 0;
  var particles = [];
  var MAX_PARTICLES = 2600;

  function applySeed(seedStr) {
    params.seed = seedStr;
    rand = mulberry32(hashSeed(seedStr));
    buildPermutation(rand);
    fieldScale = 0.0009 + rand() * 0.0018;
    fieldTime = rand() * 1000;
  }

  function fieldAngle(x, y) {
    var n = fbm(x * fieldScale + fieldTime, y * fieldScale - fieldTime * 0.6);
    return n * Math.PI * 4;
  }

  // ---------- canvas ----------
  function paintBackground() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
  }
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    var snapshot = null;
    if (canvas.width > 0 && canvas.height > 0) {
      snapshot = document.createElement("canvas");
      snapshot.width = canvas.width; snapshot.height = canvas.height;
      snapshot.getContext("2d").drawImage(canvas, 0, 0);
    }
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    paintBackground();
    if (snapshot) ctx.drawImage(snapshot, 0, 0, snapshot.width / DPR, snapshot.height / DPR);
  }

  // ---------- particles ----------
  function spawn(x, y, vx, vy) {
    if (particles.length >= MAX_PARTICLES) particles.splice(0, 24);
    var accent = Math.random() < params.accent;
    particles.push({
      x: x, y: y, px: x, py: y,
      vx: vx, vy: vy,
      control: 1,
      life: 0,
      maxLife: 220 + Math.random() * 300,
      weight: 0.5 + Math.random() * 1.1,
      accent: accent,
      alpha: 0.05 + Math.random() * 0.10
    });
  }

  function step() {
    fieldTime += 0.00035;
    var release = 0.9965 - (1 - params.grip) * 0.012; // control decay per frame
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.px = p.x; p.py = p.y;

      var a = fieldAngle(p.x, p.y);
      var fx = Math.cos(a) * params.flow * 2.2;
      var fy = Math.sin(a) * params.flow * 2.2;

      // the field gradually steals the stroke
      p.control *= release;
      var c = p.control;
      p.vx = p.vx * (0.86 + 0.12 * c) + fx * (1 - c) * 0.14;
      p.vy = p.vy * (0.86 + 0.12 * c) + fy * (1 - c) * 0.14;

      p.x += p.vx;
      p.y += p.vy;
      p.life++;

      if (p.life > p.maxLife || p.x < -40 || p.x > W + 40 || p.y < -40 || p.y > H + 40) {
        particles.splice(i, 1);
        continue;
      }

      var t = 1 - p.life / p.maxLife;
      var col = p.accent ? ACCENT : INK;
      ctx.strokeStyle = "rgba(" + col.r + "," + col.g + "," + col.b + "," + (p.alpha * t).toFixed(3) + ")";
      ctx.lineWidth = p.weight * (0.4 + 0.6 * t);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
    requestAnimationFrame(step);
  }

  // ---------- input ----------
  var drawing = false;
  var lastX = 0, lastY = 0, lastT = 0;
  var hint = document.getElementById("hint");
  var panel = document.getElementById("panel");
  var hideTimer = null;

  function wakePanel() {
    panel.classList.remove("hidden");
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(function () { panel.classList.add("hidden"); }, 3500);
  }

  function pointerDown(e) {
    if (e.target !== canvas) return;
    drawing = true;
    lastX = e.clientX; lastY = e.clientY; lastT = e.timeStamp;
    hint.classList.add("gone");
    canvas.setPointerCapture(e.pointerId);
  }
  function pointerMove(e) {
    wakePanel();
    if (!drawing) return;
    var x = e.clientX, y = e.clientY;
    var dt = Math.max(e.timeStamp - lastT, 1);
    var dx = x - lastX, dy = y - lastY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 0.5) return;
    var speed = Math.min(dist / dt, 3);
    var vx = (dx / dist) * (0.6 + speed * 1.4);
    var vy = (dy / dist) * (0.6 + speed * 1.4);
    var n = Math.min(Math.ceil(dist / 3), 14);
    for (var i = 0; i < n; i++) {
      var t = i / n;
      var jx = (Math.random() - 0.5) * 2.5;
      var jy = (Math.random() - 0.5) * 2.5;
      spawn(lastX + dx * t + jx, lastY + dy * t + jy,
            vx + (Math.random() - 0.5) * 0.6,
            vy + (Math.random() - 0.5) * 0.6);
    }
    lastX = x; lastY = y; lastT = e.timeStamp;
  }
  function pointerUp() { drawing = false; }

  canvas.addEventListener("pointerdown", pointerDown);
  window.addEventListener("pointermove", pointerMove);
  window.addEventListener("pointerup", pointerUp);
  window.addEventListener("pointercancel", pointerUp);

  // ---------- controls ----------
  var seedInput = document.getElementById("seedInput");
  var accentSlider = document.getElementById("accentSlider");
  var flowSlider = document.getElementById("flowSlider");
  var gripSlider = document.getElementById("gripSlider");
  var accentVal = document.getElementById("accentVal");
  var flowVal = document.getElementById("flowVal");
  var gripVal = document.getElementById("gripVal");

  seedInput.addEventListener("change", function () {
    applySeed(seedInput.value || "godn-01");
  });
  document.getElementById("reseedBtn").addEventListener("click", function () {
    var s = "godn-" + Math.floor(Math.random() * 9000 + 1000);
    seedInput.value = s;
    applySeed(s);
  });
  accentSlider.addEventListener("input", function () {
    params.accent = accentSlider.value / 100;
    accentVal.textContent = accentSlider.value + "%";
  });
  flowSlider.addEventListener("input", function () {
    params.flow = flowSlider.value / 100;
    flowVal.textContent = flowSlider.value;
  });
  gripSlider.addEventListener("input", function () {
    params.grip = gripSlider.value / 100;
    gripVal.textContent = gripSlider.value;
  });
  document.getElementById("clearBtn").addEventListener("click", function () {
    particles = [];
    paintBackground();
    hint.classList.remove("gone");
  });
  document.getElementById("saveBtn").addEventListener("click", function () {
    var a = document.createElement("a");
    a.download = "inkline-" + params.seed + ".png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });

  window.addEventListener("mousemove", wakePanel);
  window.addEventListener("resize", resize);

  // ---------- init ----------
  applySeed(params.seed);
  resize();
  wakePanel();
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
